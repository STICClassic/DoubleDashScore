<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DoubleDashScore</title>

    <!-- Baloo 2 — samma font som appen (Resources/Fonts/Baloo2*). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="appicon.png">
    <link rel="apple-touch-icon" href="appicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <img class="app-header__icon" src="appicon.png" alt="DoubleDashScore">
        <h1 class="app-header__title">DoubleDashScore</h1>
    </header>

    <!-- Inre Statistik-tabbar — syns bara när huvudtabben Statistik är aktiv.
         Fast krom ovanför det scrollande innehållet (förblir alltid synliga). -->
    <nav id="inner-tabs" class="inner-tabs" hidden>
        <button type="button" class="inner-tab is-active" data-inner="oversikt">Översikt</button>
        <button type="button" class="inner-tab" data-inner="kvallsgraf">Kvällsgraf</button>
        <button type="button" class="inner-tab" data-inner="totalscore">Totalscore</button>
        <button type="button" class="inner-tab" data-inner="placeringar">Placeringar</button>
        <button type="button" class="inner-tab" data-inner="karriargraf">Karriärgraf</button>
    </nav>

    <!-- Innehåll: en panel åt gången. Varje panel är sin egen scroll-container
         (display:none på inaktiva bevarar scroll-läget per tabb). -->
    <main id="content">
        <!-- Kvällar (huvudtabb) -->
        <section class="panel" data-panel="kvallar">
            <div class="panel-inner">
                <div id="nights-status" class="status">Laddar…</div>
                <div id="nights-list" class="nights"></div>
            </div>
        </section>

        <!-- Totalscore (Statistik-tabb) -->
        <section class="panel" data-panel="totalscore" hidden>
            <div class="panel-inner">
                <div id="totalscore-status" class="status"></div>
                <div id="totalscore-table" class="table-scroll"></div>
            </div>
        </section>

        <!-- Placeringar (Statistik-tabb) -->
        <section class="panel" data-panel="placeringar" hidden>
            <div class="panel-inner">
                <div id="placeringar-status" class="status"></div>
                <div id="placeringar-placements" class="table-scroll"></div>
            </div>
        </section>

        <!-- Kvällsgraf (Statistik-tabb) -->
        <section class="panel" data-panel="kvallsgraf" hidden>
            <div class="panel-inner">
                <div id="kvallsgraf-status" class="status"></div>
                <div class="chart-block" data-graph="night">
                    <div class="chart-head">
                        <span class="chart-selected-label"></span>
                        <button type="button" class="chart-fullscreen" aria-label="Helskärm">⛶</button>
                    </div>
                    <div class="chart-canvas-wrap">
                        <canvas></canvas>
                    </div>
                    <div class="chart-legend"></div>
                </div>
            </div>
        </section>

        <!-- Karriärgraf (Statistik-tabb) -->
        <section class="panel" data-panel="karriargraf" hidden>
            <div class="panel-inner">
                <div id="karriargraf-status" class="status"></div>
                <div class="chart-block" data-graph="career">
                    <div class="chart-head">
                        <span class="chart-selected-label"></span>
                        <button type="button" class="chart-fullscreen" aria-label="Helskärm">⛶</button>
                    </div>
                    <div class="chart-canvas-wrap">
                        <canvas></canvas>
                    </div>
                    <div class="chart-legend"></div>
                </div>
            </div>
        </section>

        <!-- Översikt (Statistik-tabb): Totalscore + senaste 4 kvällarna -->
        <section class="panel" data-panel="oversikt" hidden>
            <div class="panel-inner">
                <div id="oversikt-status" class="status"></div>
                <div id="oversikt-totalscore" class="table-scroll"></div>
                <div class="section-divider"></div>
                <h3 class="subsection__title">Senaste 4 kvällarna</h3>
                <div id="oversikt-placements" class="table-scroll"></div>
            </div>
        </section>
    </main>

    <!-- Huvudtabbar nederst. -->
    <nav id="bottom-tabs" class="bottom-tabs">
        <button type="button" class="main-tab is-active" data-main="kvallar">Kvällar</button>
        <button type="button" class="main-tab" data-main="statistik">Statistik</button>
    </nav>

    <!-- Delad helskärms-overlay för båda graferna (skiva 24, Alt A). -->
    <div id="fs-overlay" hidden>
        <button type="button" id="fs-close" aria-label="Stäng helskärm">✕</button>
        <div id="fs-chart-wrap">
            <div id="fs-canvas-wrap">
                <canvas id="fs-canvas"></canvas>
            </div>
            <div id="fs-legend" class="chart-legend"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
