<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DoubleDashScore</title>

    <!-- Baloo 2 — samma font som appen (Resources/Fonts/Baloo2*). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="appicon.png">
    <link rel="apple-touch-icon" href="appicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <img class="app-header__icon" src="appicon.png" alt="DoubleDashScore">
        <h1 class="app-header__title">DoubleDashScore</h1>
    </header>

    <main class="content">
        <!-- Kvällar — full implementation (skiva 22). -->
        <section id="kvallar" class="section">
            <h2 class="section__title">Kvällar</h2>
            <div id="nights-status" class="status">Laddar…</div>
            <div id="nights-list" class="nights"></div>
        </section>

        <!-- Övriga sektioner: placeholders (skiva 23). Ordning enligt val. -->
        <section id="kvallsgraf" class="section">
            <h2 class="section__title section__title--placeholder">Kvällsgraf (kommer)</h2>
        </section>

        <section id="oversikt" class="section">
            <h2 class="section__title section__title--placeholder">Översikt (kommer)</h2>
        </section>

        <section id="placeringar" class="section">
            <h2 class="section__title section__title--placeholder">Placeringar (kommer)</h2>
        </section>

        <section id="karriargraf" class="section">
            <h2 class="section__title section__title--placeholder">Karriärgraf (kommer)</h2>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
