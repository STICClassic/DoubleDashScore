<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>DoubleDashScore</title>

    <!-- Baloo 2 — samma font som appen (Resources/Fonts/Baloo2*). -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="icon" type="image/png" href="appicon.png">
    <link rel="apple-touch-icon" href="appicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <img class="app-header__icon" src="appicon.png" alt="DoubleDashScore">
        <h1 class="app-header__title">DoubleDashScore</h1>
    </header>

    <main class="content">
        <!-- Kvällar — full implementation (skiva 22). -->
        <section id="kvallar" class="section">
            <h2 class="section__title">Kvällar</h2>
            <div id="nights-status" class="status">Laddar…</div>
            <div id="nights-list" class="nights"></div>
        </section>

        <!-- Kvällsgraf — kvällssnitt över tid (skiva 24). -->
        <section id="kvallsgraf" class="section">
            <h2 class="section__title">Kvällsgraf</h2>
            <div id="kvallsgraf-status" class="status"></div>
            <div class="chart-block" data-graph="night">
                <div class="chart-head">
                    <span class="chart-selected-label"></span>
                    <button type="button" class="chart-fullscreen" aria-label="Helskärm">⛶</button>
                </div>
                <div class="chart-canvas-wrap">
                    <canvas></canvas>
                </div>
                <div class="chart-legend"></div>
            </div>
        </section>

        <!-- Översikt — Totalscore + senaste 4 kvällarnas placeringar (skiva 23). -->
        <section id="oversikt" class="section">
            <h2 class="section__title">Översikt</h2>
            <div id="oversikt-status" class="status"></div>
            <div id="oversikt-totalscore" class="table-scroll"></div>
            <div class="section-divider"></div>
            <h3 class="subsection__title">Senaste 4 kvällarna</h3>
            <div id="oversikt-placements" class="table-scroll"></div>
        </section>

        <!-- Placeringar — full tabell, alla kvällar (skiva 23). -->
        <section id="placeringar" class="section">
            <h2 class="section__title">Placeringar</h2>
            <div id="placeringar-status" class="status"></div>
            <div id="placeringar-placements" class="table-scroll"></div>
        </section>

        <!-- Karriärgraf — rullande karriärsnitt över tid (skiva 24). -->
        <section id="karriargraf" class="section">
            <h2 class="section__title">Karriärgraf</h2>
            <div id="karriargraf-status" class="status"></div>
            <div class="chart-block" data-graph="career">
                <div class="chart-head">
                    <span class="chart-selected-label"></span>
                    <button type="button" class="chart-fullscreen" aria-label="Helskärm">⛶</button>
                </div>
                <div class="chart-canvas-wrap">
                    <canvas></canvas>
                </div>
                <div class="chart-legend"></div>
            </div>
        </section>
    </main>

    <!-- Delad helskärms-overlay för båda graferna (skiva 24, Alt A). -->
    <div id="fs-overlay" hidden>
        <button type="button" id="fs-close" aria-label="Stäng helskärm">✕</button>
        <div id="fs-chart-wrap">
            <div id="fs-canvas-wrap">
                <canvas id="fs-canvas"></canvas>
            </div>
            <div id="fs-legend" class="chart-legend"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
