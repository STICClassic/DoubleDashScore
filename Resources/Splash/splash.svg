<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="456" height="456" viewBox="0 0 456 456" version="1.1" xmlns="http://www.w3.org/2000/svg">
    <!-- Avsiktligt tom/osynlig splash-bild: en svart fyrkant som matchar
         MauiSplashScreen Color="#000000". Renderas som osynlig mot den svarta
         OS-splash-bakgrunden så ingen logga/blink syns före in-app SplashPage.
         Svart rect (inte transparent) valt för att vara helt pålitligt på
         Android 12+ SplashScreen API — giltiga bounds, inga transparens-
         edge-cases, garanterat osynligt mot svart bakgrund. -->
    <rect x="0" y="0" width="456" height="456" fill="#000000" />
</svg>
